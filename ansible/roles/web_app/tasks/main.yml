--- 
- name: Include wipe task
  include_tasks: wipe.yml
  tags:
    - web_app_wipe

- name: Login
  docker_login:
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"
  no_log: true  # Prevents credentials in logs

- name: Deploy application with Docker Compose
  block:
    - name: Create app directory
      file:
        path: "{{ compose_project_dir }}"
        state: directory

    - name: Template docker-compose file
      template:
        src: ../templates/docker-compose.yml.j2
        dest: "{{ compose_project_dir }}/docker-compose.yml"

    - name: Deploy with docker-compose
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        pull: always
        state: present

  rescue:
    - name: Handle deployment failure
      debug:
        msg: "Failed to start docker compose"

  tags:
    - app_deploy
    - compose

- name: Verify Container Running
  wait_for:
    host: "{{ local_addr }}"
    port: "{{ app_port }}"
    connect_timeout: 1
    delay: 5
    state: drained
    sleep: 2

- name: Check Health
  uri:
    url: "http://{{ local_addr }}:{{ app_port }}/health"
    method: GET
