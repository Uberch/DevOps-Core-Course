apiVersion: apps/v1
kind: Deployment
metadata:
  name: infoservices
  labels:
    app: infoservice

spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  replicas: {{ .Values.replicaCount | default 3 }}
  selector:
    matchLabels:
      app: infoservice

  template:
    metadata:
      labels:
        app: infoservice
    spec:
      containers:
      - name: infoservice
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: "Always"

        resources: {{ .Values.recources }}
        livenessProbe: {{ .Values.livenessProbe }}
        readinessProbe: {{ .Values.readinessProbe }}

annotations:
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/role: "admin"
  vault.hashicorp.com/agent-inject-secret-config: "secret/data/myapp/config"
