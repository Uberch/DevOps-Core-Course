global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Storage retention (Prometheus 3.x config-based retention)
storage:
  tsdb:
    retention:
      time: 15d
      size: 10GB

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'python'
    static_configs:
      - targets: ['infoservice-python:8000']
    metrics_path: '/metrics'

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
    metrics_path: '/metrics'

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: '/metrics'
