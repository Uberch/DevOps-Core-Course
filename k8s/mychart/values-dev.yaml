credentials:
  username: default
  password: default

replicaCount: 1

image:
  tag: "latest"

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

service:
  type: NodePort

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10

env:
  - name: Credentials
    valueFrom:
      secretKeyRef:
        name: secret-name
        key: password
