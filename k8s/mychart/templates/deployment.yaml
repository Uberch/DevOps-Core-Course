apiVersion: apps/v1
kind: Deployment
metadata:
  name: infoservices
  labels:
    app: infoservice

spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  replicas: {{ .Values.replicaCount | default 3 }}
  selector:
    matchLabels:
      app: infoservice

  template:
    metadata:
      labels:
        app: infoservice
    spec:
      
      initContainers:
        - name: init-download
          image: busybox:1.36
          command: ['sh', '-c', 'wget -O /work-dir/index.html https://example.com']
          volumeMounts:
            - name: workdir
              mountPath: /work-dir
        - name: wait-for-service
          image: busybox:1.36
          command: ['sh', '-c', 'until nslookup myservice; do sleep 2; done']

      containers:
        - name: infoservice
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: "Always"

          resources: {{ .Values.recources }}
          livenessProbe: {{ .Values.livenessProbe }}
          readinessProbe: {{ .Values.readinessProbe }}
          volumeMounts:
            - name: workdir
              mountPath: /work-dir

  volumes:
    - name: config-volume
      configMap:
        name: config-name
    - name: data-volume
      persistentVolumeClaim:
        claimName: {{ include "mychart.fullname" . }}-data
    - name: workdir
      emptyDir: {}

  containers:
    - volumeMounts:
      - name: config-volume
        mountPath: /config
    - volumeMounts:
      - name: data-volume
        mountPath: /data

  envFrom:
    - configMapRef:
      name: {{ include "mychart.fullname" . }}-env

annotations:
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/role: "admin"
  vault.hashicorp.com/agent-inject-secret-config: "secret/data/myapp/config"
